<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM PRO</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI',sans-serif;
  background: radial-gradient(circle at top,#020617,#0f172a);
  color:white;
}

/* LAYOUT */
.layout{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
  width:230px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(20px);
  padding:20px;
}
.logo{font-size:18px;font-weight:bold;margin-bottom:20px}
.menu a{
  display:block;
  padding:12px;
  border-radius:10px;
  margin-bottom:5px;
  color:#cbd5e1;
  text-decoration:none;
}
.menu a:hover,.active{
  background:#1e293b;
  color:#fff;
}

/* MAIN */
.main{flex:1;padding:20px}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-bottom:20px;
}
.card{
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
.card h3{margin:0;font-size:14px;color:#94a3b8}
.card p{font-size:28px;margin:5px 0}

/* ALERT */
.alert{
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:1px solid #334155;
}
.alert.red{border-color:#ef4444}
.alert.yellow{border-color:#f59e0b}

/* TABLE */
table{width:100%;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid #334155}

/* BUTTON */
button{
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.line{background:#22c55e;color:white}
.danger{background:#ef4444;color:white}
.renew{background:#3b82f6;color:white}

</style>
</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">🚀 CRM PRO</div>

  <div class="menu">
    <a class="active">Dashboard</a>
    <a>ลูกค้าทั้งหมด</a>
    <a>ใกล้หมด</a>
    <a>หมดอายุ</a>
    <a>รายได้</a>
    <a>ตั้งค่า</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
  <div>Dashboard</div>
  <div>🔔 แจ้งเตือน | Admin</div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="card"><h3>ลูกค้าทั้งหมด</h3><p id="total">0</p></div>
  <div class="card"><h3>กำลังใช้งาน</h3><p id="active">0</p></div>
  <div class="card"><h3>ใกล้หมด</h3><p id="soon">0</p></div>
  <div class="card"><h3>หมดอายุ</h3><p id="late">0</p></div>
</div>

<!-- ALERT -->
<div id="alerts"></div>

<!-- TABLE -->
<div class="card">
<table id="table"></table>
</div>

</div>
</div>

<script>
let DB=JSON.parse(localStorage.getItem('db')||'[]')

function save(){localStorage.setItem('db',JSON.stringify(DB))}

function daysLeft(d){
  return Math.ceil((new Date(d)-new Date())/86400000)
}

function status(d){
  let x=daysLeft(d)
  if(x<0) return 'late'
  if(x<=3) return 'soon'
  return 'ok'
}

function render(){
  let html='<tr><th>ชื่อ</th><th>หมดอายุ</th><th>วัน</th><th>จัดการ</th></tr>'
  let t=0,a=0,s=0,l=0
  let alertHTML=''

  DB.forEach(c=>{
    let d=daysLeft(c.end)
    let st=status(c.end)

    t+=c.price||0
    if(st=='ok') a++
    if(st=='soon') s++
    if(st=='late') l++

    if(st!='ok'){
      alertHTML+=`
      <div class="alert ${st=='late'?'red':'yellow'}">
        ${c.name} เหลือ ${d} วัน
        <button class="line" onclick="line('${c.line}')">LINE</button>
      </div>`
    }

    html+=`
    <tr>
      <td>${c.name}</td>
      <td>${c.end}</td>
      <td>${d}</td>
      <td>
        <button class="renew" onclick="renew(${c.id})">+30</button>
        <button class="line" onclick="line('${c.line}')">LINE</button>
        <button class="danger" onclick="del(${c.id})">ลบ</button>
      </td>
    </tr>`
  })

  table.innerHTML=html
  alerts.innerHTML=alertHTML || 'ไม่มีแจ้งเตือน'

  total.innerText=DB.length
  active.innerText=a
  soon.innerText=s
  late.innerText=l
}

function line(id){
  window.open('https://line.me/ti/p/~'+id)
}

function renew(id){
  let c=DB.find(x=>x.id==id)
  let d=new Date(c.end)
  d.setDate(d.getDate()+30)
  c.end=d.toISOString().slice(0,10)
  save();render()
}

function del(id){
  DB=DB.filter(x=>x.id!=id)
  save();render()
}

/* DEMO */
if(DB.length==0){
DB=[
{id:1,name:'สมชาย',line:'somchai01',end:'2026-04-25',price:120},
{id:2,name:'วิภา',line:'vipaa',end:'2026-04-20',price:120}
]
save()
}

render()
</script>

</body>
</html>
